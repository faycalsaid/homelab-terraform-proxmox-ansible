---
# K3s Cluster Deployment Playbook
# Deploys a single-node K3s cluster using the official k3s-ansible collection,
# then hardens the node (SSH, UFW, fail2ban, Tailscale) and installs Helm.
#
# Usage:
#   ansible-playbook playbooks/k3s.yml
#
# Prerequisites:
#   ansible-galaxy collection install -r requirements.yml

- name: Deploy K3s cluster
  ansible.builtin.import_playbook: k3s.orchestration.site

- name: Harden K3s cluster nodes
  hosts: k3s-cluster
  become: true
  roles:
    - role: k3s-setup

